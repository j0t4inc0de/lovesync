version: '3.8'

services:
  lovesync-db:
    image: postgres:15-alpine
    container_name: lovesync-db
    environment:
      POSTGRES_DB: lovesync
      POSTGRES_USER: lovesync
      POSTGRES_PASSWORD: lovesync_password_secure
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  lovesync-backend:
    build:
      context: ./backend
    container_name: lovesync-backend
    env_file:
      - path: .env
        required: false
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgres://lovesync:lovesync_password_secure@lovesync-db:5432/lovesync
      JWT_SECRET: lovesync-jwt-token-secret-9999
      PORT: 3000
    depends_on:
      - lovesync-db
    networks:
      - default
      - proxy_network
    restart: always

  lovesync-frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: lovesync-frontend
    depends_on:
      - lovesync-backend
    networks:
      - default
      - proxy_network
    restart: always

networks:
  default:
  proxy_network:
    external: true

volumes:
  postgres_data:
