<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Brand Gradient -->
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff375f" />
      <stop offset="100%" stop-color="#ff6b8b" />
    </linearGradient>
    <!-- Soft Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background Canvas -->
  <rect width="512" height="512" rx="128" fill="#ffffff" />
  <!-- Glowing Heart Logo -->
  <path d="M256 420l-26-23.7C125.6 301.6 64 249 64 183.8 64 130.6 105.6 90 158.8 90c30 0 58.8 14 77.6 36.1 4.7 5.5 11.6 5.5 16.3 0C271.6 104 300.4 90 330.4 90 383.6 90 425 130.6 425 183.8c0 65.2-61.6 117.8-166 212.7L256 420z" 
        fill="url(#heartGrad)" 
        filter="url(#glow)" />
</svg>